<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PCState</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5; 
            color: rgba(0, 0, 0, 0.85);
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 24px;
            margin-bottom: 16px;
        }
        
        h1 { 
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(0, 0, 0, 0.85);
        }
        

        
        .wall-wrapper {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        
        .overview {
            flex-shrink: 0;
            width: 160px;
            font-size: 16px;
            color: rgba(0, 0, 0, 0.45);
            background: #fff;
            border-radius: 4px;
            border: 1px solid #d9d9d9;
            overflow: hidden;
        }
        
        .overview-title {
            font-weight: 500;
            color: rgba(0, 0, 0, 0.65);
            padding: 8px 12px;
            background: #fafafa;
            border-bottom: 1px solid #d9d9d9;
        }
        
        #overview-list {
            border-top: 1px solid #d9d9d9;
        }
        
        .overview-item {
            padding: 8px 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid #e8e8e8;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .overview-item:last-child {
            border-bottom: none;
        }
        
        .overview-item:hover {
            background: #e6f7ff;
        }
        
        .overview-item.active {
            background: #1890ff;
            color: #fff;
        }
        
        .overview-item.active .date,
        .overview-item.active .duration {
            color: #fff;
        }
        
        .overview-item .date {
            display: inline-block;
            width: 70px;
        }
        
        .overview-item .duration {
            color: #1890ff;
            font-weight: 500;
        }
        
        .wall-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .wall-row {
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .time-label-top {
            position: absolute;
            top: -20px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.45);
            transform: translateX(-50%);
            white-space: nowrap;
        }
        
        .time-label-left {
            position: absolute;
            left: -40px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.45);
            text-align: right;
            width: 32px;
            transform: translateY(-50%);
        }
        
        #wallCanvas { 
            display: block;
            background: #fafafa;
            border-radius: 4px;
        }
        
        .info {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.45);
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 4px;
            line-height: 1.6;
        }

        .info-date {
            font-weight: 500;
            color: rgba(0, 0, 0, 0.65);
            margin-bottom: 8px;
            display: block;
        }

        .legend {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.45);
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 4px;
            line-height: 1.6;
        }

        .legend-title {
            font-weight: 500;
            color: rgba(0, 0, 0, 0.65);
            margin-bottom: 8px;
        }

        .footer {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 24px 20px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.45);
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>PCState - PC活跃状态记录器</h1>
            
            <div class="wall-wrapper">
                <div class="overview">
                    <div class="overview-title">近14天活跃</div>
                    <div id="overview-list"></div>
                </div>
                
                <div class="wall-container">
                    <div class="info" id="info">加载数据中...</div>
                
                <div class="wall-row" id="wallRow">
                    <canvas id="wallCanvas"></canvas>
                </div>
                <div class="legend">
                    <div>每个小格表示5分钟，格子颜色越深表示越繁忙。</div>
                </div>
            </div>

        </div>
    </div>

    <div class="footer">
        PCState <span id="app-version">v1.0.0</span> · PC活跃状态记录器 · <a href="https://github.com/3plus10i/pcstate" target="_blank" style="color: #0084ffb0; text-decoration: none;">项目主页</a>
        <br>
        数据页生成于 <span id="generated-date"></span>
    </div>

    <script src="data.js"></script>
    <script src="StateBlockChart.js"></script>
    <script>
    const wall = new StateBlockChart('wallCanvas', { containerId: 'wallRow' });

    // 设置页脚信息（版本号 + 生成日期）
    function setFooterInfo() {
        const version = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '1.0.0';
        document.getElementById('app-version').textContent = 'v' + version;
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('generated-date').textContent =
            `${year}-${month}-${day} ${hours}:${minutes}`;
    }

    function formatDuration(minutes) {
        if (minutes >= 60) {
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h}h${m}m`;
        }
        return `${minutes}min`;
    }
    
    function formatDate(dateStr) {
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const d = new Date(dateStr);
        const weekDay = '(' + weekDays[d.getDay()] + ')';
        
        return (d.getMonth() + 1) + '/' + d.getDate() + weekDay;
    }

    async function main() {
        if (!LOG_DATA || !DATES) {
            document.getElementById('info').textContent = '数据加载失败';
            return;
        }
        
        const overviewList = document.getElementById('overview-list');
        
        // 生成总览列表（可点击）
        for (let i = 0; i < DATES.length; i++) {
            const slots = LOG_DATA[i] || [];
            const activeSlots = slots.filter(v => v > 0).length;
            const activeMinutes = activeSlots * 5;
            
            const item = document.createElement('div');
            item.className = 'overview-item';
            item.innerHTML = `<span class="date">${formatDate(DATES[i])}</span> <span class="duration">${formatDuration(activeMinutes)}</span>`;
            item.onclick = () => showDay(i, item);
            overviewList.appendChild(item);
        }
        
        // 默认选中第一天
        if (DATES.length > 0) {
            showDay(0, overviewList.firstChild);
        }
    }

    function showDay(dayIndex, element) {
        // 移除所有active类
        document.querySelectorAll('.overview-item').forEach(el => el.classList.remove('active'));
        // 添加active类到当前元素
        element.classList.add('active');

        const slots = LOG_DATA[dayIndex] || [];
        const dateStr = DATES[dayIndex];

        wall.render(slots);

        const activeSlots = slots.filter(v => v > 0).length;
        const activeMinutes = activeSlots * 5;
        const activeHours = Math.floor(activeMinutes / 60);
        const activeMins = activeMinutes % 60;
        if (activeHours === 0) {
            document.getElementById('info').innerHTML =
                `<span class="info-date">${dateStr}</span>活跃时间${activeMins}分钟，已点亮${activeSlots}个小格`;
        } else {
            document.getElementById('info').innerHTML =
                `<span class="info-date">${dateStr}</span>活跃时间${activeHours}小时${activeMins}分钟，已点亮${activeSlots}个小格`;
        }
    }

    setFooterInfo();
    main();
    </script>
</body>
</html>
